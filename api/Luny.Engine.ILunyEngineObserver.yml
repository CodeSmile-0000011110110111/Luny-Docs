- uid: Luny.Engine.ILunyEngineObserver.OnEngineHeartbeat
  commentId: M:Luny.Engine.ILunyEngineObserver.OnEngineHeartbeat
  id: OnEngineHeartbeat
  parent: Luny.Engine.ILunyEngineObserver
  langs:
  - csharp
  - vb
  name: OnEngineHeartbeat()
  nameWithType: ILunyEngineObserver.OnEngineHeartbeat()
  fullName: Luny.Engine.ILunyEngineObserver.OnEngineHeartbeat()
  type: Method
  source:
    id: OnEngineHeartbeat
    path: U:\LunyScratch\LunyScript_Examples_Unity\Packages\de.codesmile.lunyscript\Luny\Engine\ILunyEngineObserver.cs
    startLine: 33
  assemblies:
  - Luny
  namespace: Luny.Engine
  summary: Runs on the engine's fixed stepping frequency. Most suitable for deterministic game logic and to modify the Physics simulation.
  remarks: >-
    Engine internal physics simulation occurs right after a Heartbeat and before FrameUpdate.


    Caution: Heartbeat frequency depends on engine time-stepping settings, and is not guaranteed to be in sync with FrameRate.

    The behaviour depends on each frame's delta time (frame rate) and the engine's fixed step (or physics) time setting.
    	- Heartbeat may be called less often than FrameUpdate
    	- Heartbeat may be called several times in a single frame (all before FrameUpdate)
  example: []
  syntax:
    content: void OnEngineHeartbeat()
    content.vb: Sub OnEngineHeartbeat()
  overload: Luny.Engine.ILunyEngineObserver.OnEngineHeartbeat*
