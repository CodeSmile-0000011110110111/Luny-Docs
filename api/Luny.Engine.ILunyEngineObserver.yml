    path: U:\LunyScratch\LunyScript_Examples_Unity\Packages\de.codesmile.lunyscript\Luny\Engine\ILunyEngineObserver.cs
    startLine: 75
  assemblies:
  - Luny
  namespace: Luny.Engine
  summary: >-
    Called when a LunyObject registered with LunyEngine.

    Runs when object is created, before object's OnCreate callback. Its NativeObject is already assigned.
  remarks: In future it may also be called for transferring native object ownership to LunyEngine.
  example: []
  syntax:
    content: void OnObjectRegistered(ILunyObject lunyObject)
    parameters:
    - id: lunyObject
      type: Luny.Engine.Bridge.ILunyObject
      description: ''
    content.vb: Sub OnObjectRegistered(lunyObject As ILunyObject)
  overload: Luny.Engine.ILunyEngineObserver.OnObjectRegistered*
