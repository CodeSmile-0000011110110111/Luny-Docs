- uid: LunyScript.Script.For(System.Int32,System.Int32)
  commentId: M:LunyScript.Script.For(System.Int32,System.Int32)
  id: For(System.Int32,System.Int32)
  parent: LunyScript.Script
  langs:
  - csharp
  - vb
  name: For(int, int)
  nameWithType: Script.For(int, int)
  fullName: LunyScript.Script.For(int, int)
  type: Method
  assemblies:
  - LunyScript
  namespace: LunyScript
  summary: >-
    For loop (1-based index): For(limit, step).Do(blocks);

    If step is positive: starts at 1 and increments by step until limit is reached.

    If step is negative: starts at limit and decrements by step until 1 is reached.
  example: []
  syntax:
    content: public ForBlockBuilder For(int numberOfTimes, int step)
    parameters:
    - id: numberOfTimes
      type: System.Int32
    - id: step
      type: System.Int32
    return:
      type: LunyScript.Api.ForBlockBuilder
    content.vb: Public Function [For](numberOfTimes As Integer, [step] As Integer) As ForBlockBuilder
  overload: LunyScript.Script.For*
  nameWithType.vb: Script.For(Integer, Integer)
  fullName.vb: LunyScript.Script.For(Integer, Integer)
  name.vb: For(Integer, Integer)
