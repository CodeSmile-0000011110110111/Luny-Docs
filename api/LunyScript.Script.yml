  langs:
  - csharp
  - vb
  name: For(int)
  nameWithType: Script.For(int)
  fullName: LunyScript.Script.For(int)
  type: Method
  assemblies:
  - LunyScript
  namespace: LunyScript
  summary: >-
    For loop (1-based index): For(numberOfTimes).Do(blocks);

    Starts at 1 and increments by 1 until limit is reached (inclusive).
  example: []
  syntax:
    content: public ForBlockBuilder For(int numberOfTimes)
    parameters:
    - id: numberOfTimes
      type: System.Int32
    return:
      type: LunyScript.Api.ForBlockBuilder
    content.vb: Public Function [For](numberOfTimes As Integer) As ForBlockBuilder
  overload: LunyScript.Script.For*
