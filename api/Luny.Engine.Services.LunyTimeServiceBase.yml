  summary: Gets the total number of frames LunyEngine has run since launch. This value is consistent across engines.
  remarks: Initialization (startup, OnCreate, OnEnable) occurs in FrameCount 0. By OnReady (and before first OnHeartbeat/OnFrame) FrameCount will be 1.
