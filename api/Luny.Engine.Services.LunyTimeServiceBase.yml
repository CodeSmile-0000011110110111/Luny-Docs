- uid: Luny.Engine.Services.LunyTimeServiceBase.EngineFrameCount
  commentId: P:Luny.Engine.Services.LunyTimeServiceBase.EngineFrameCount
  id: EngineFrameCount
  parent: Luny.Engine.Services.LunyTimeServiceBase
  langs:
  - csharp
  - vb
  name: EngineFrameCount
  nameWithType: LunyTimeServiceBase.EngineFrameCount
  fullName: Luny.Engine.Services.LunyTimeServiceBase.EngineFrameCount
  type: Property
  source:
    id: EngineFrameCount
    path: U:\LunyScratch\LunyScript_Examples_Unity\Packages\de.codesmile.lunyscript\Luny\Engine\Services\LunyTimeServiceBase.cs
    startLine: 69
  assemblies:
  - Luny
  namespace: Luny.Engine.Services
  summary: Gets the engine's frame count since the application started.
  remarks: >-
    CAUTION: This value may differ between engines! Some engines start with frame 0, others in frame 1.

    Unity for instance launches in frame 0 where it runs Awake and OnEnable, but by Start it has incremented FrameCount to 1.

    While in Godot the entire first frame's FrameCount is 0.

    Prefer FrameCount since it is the same for all engines.
  example: []
  syntax:
    content: public abstract long EngineFrameCount { get; }
    parameters: []
    return:
      type: System.Int64
    content.vb: Public MustOverride ReadOnly Property EngineFrameCount As Long
  overload: Luny.Engine.Services.LunyTimeServiceBase.EngineFrameCount*
  implements:
  - Luny.Engine.Services.ILunyTimeService.EngineFrameCount
