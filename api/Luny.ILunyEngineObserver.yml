- uid: Luny.ILunyEngineObserver.OnObjectRegistered(Luny.Engine.Bridge.ILunyObject)
  commentId: M:Luny.ILunyEngineObserver.OnObjectRegistered(Luny.Engine.Bridge.ILunyObject)
  id: OnObjectRegistered(Luny.Engine.Bridge.ILunyObject)
  parent: Luny.ILunyEngineObserver
  langs:
