  - vb
  name: OnObjectRegistered(ILunyObject)
  nameWithType: ILunyEngineObserver.OnObjectRegistered(ILunyObject)
  fullName: Luny.ILunyEngineObserver.OnObjectRegistered(Luny.Engine.Bridge.ILunyObject)
  type: Method
  assemblies:
  - Luny
  namespace: Luny
  summary: >-
    Called when a LunyObject registered with LunyEngine.

    Runs when object is created, before object's OnCreate callback. Its NativeObject is already assigned.
  remarks: In future it may also be called for transferring native object ownership to LunyEngine.
  example: []
  syntax:
    content: void OnObjectRegistered(ILunyObject lunyObject)
    parameters:
    - id: lunyObject
      type: Luny.Engine.Bridge.ILunyObject
      description: ''
    content.vb: Sub OnObjectRegistered(lunyObject As ILunyObject)
  overload: Luny.ILunyEngineObserver.OnObjectRegistered*
- uid: Luny.ILunyEngineObserver.OnObjectUnregistered(Luny.Engine.Bridge.ILunyObject)
  commentId: M:Luny.ILunyEngineObserver.OnObjectUnregistered(Luny.Engine.Bridge.ILunyObject)
  id: OnObjectUnregistered(Luny.Engine.Bridge.ILunyObject)
  parent: Luny.ILunyEngineObserver
  langs:
  - csharp
  - vb
  name: OnObjectUnregistered(ILunyObject)
  nameWithType: ILunyEngineObserver.OnObjectUnregistered(ILunyObject)
  fullName: Luny.ILunyEngineObserver.OnObjectUnregistered(Luny.Engine.Bridge.ILunyObject)
  type: Method
  assemblies:
  - Luny
  namespace: Luny
  summary: >-
    Called when a LunyObject has unregistered from LunyEngine. Runs when object is destroyed, after object's OnDestroy callback.

    The LunyObject instance is already invalidated but its NativeObject is still valid.
  remarks: In future it may also be called for releasing ownership of native objects from LunyEngine.
  example: []
  syntax:
    content: void OnObjectUnregistered(ILunyObject lunyObject)
    parameters:
    - id: lunyObject
      type: Luny.Engine.Bridge.ILunyObject
      description: ''
    content.vb: Sub OnObjectUnregistered(lunyObject As ILunyObject)
  overload: Luny.ILunyEngineObserver.OnObjectUnregistered*
