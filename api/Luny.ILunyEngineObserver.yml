  type: Method
  assemblies:
  - Luny
  namespace: Luny
  summary: >-
    Called when a LunyObject registered with LunyEngine either via instantiation or handing ownership of an existing

    engine object to LunyEngine. Runs before the object's OnCreated callback.
  example: []
