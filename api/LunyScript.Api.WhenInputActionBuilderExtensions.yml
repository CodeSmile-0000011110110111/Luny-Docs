  type: Method
  assemblies:
  - LunyScript
  namespace: LunyScript.Api
  summary: >-
    Runs when the input action has started processing. All input actions run Start event.

    For unconditional actions it is the same as Performed event.
  remarks: >-
    For "hold" or "slow tap" interactions the Started event runs with the beginning of the hold or tap.

    The Performed even will be delayed accordingly.
  example: []
  syntax:
    content: public static WhenInputActionBuilder Started(this WhenInputActionBuilder b, params ActionBlock[] startedBlocks)
    parameters:
    - id: b
      type: LunyScript.Api.WhenInputActionBuilder
      description: ''
    - id: startedBlocks
      type: LunyScript.Blocks.ActionBlock[]
      description: ''
    return:
      type: LunyScript.Api.WhenInputActionBuilder
      description: ''
    content.vb: Public Shared Function Started(b As WhenInputActionBuilder, ParamArray startedBlocks As ActionBlock()) As WhenInputActionBuilder
