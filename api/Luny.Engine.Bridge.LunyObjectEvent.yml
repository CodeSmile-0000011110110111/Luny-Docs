- uid: Luny.Engine.Bridge.LunyObjectEvent.OnHeartbeat
  commentId: F:Luny.Engine.Bridge.LunyObjectEvent.OnHeartbeat
  id: OnHeartbeat
  parent: Luny.Engine.Bridge.LunyObjectEvent
  langs:
  - csharp
  - vb
  name: OnHeartbeat
  nameWithType: LunyObjectEvent.OnHeartbeat
  fullName: Luny.Engine.Bridge.LunyObjectEvent.OnHeartbeat
  type: Field
  source:
    id: OnHeartbeat
    path: U:\LunyScratch\LunyScript_Examples_Unity\Packages\de.codesmile.lunyscript\Luny\Engine\Bridge\Enums\LunyObjectEvent.cs
    startLine: 50
  assemblies:
  - Luny
  namespace: Luny.Engine.Bridge
  summary: >-
    Runs in sync with engine's fixed update / physics processing at a fixed rate.

    May run multiple times in a single frame: catch-up behaviour, particularly in low framerate / high fixed tick scenarios.

    Is not guaranteed to run before every OnUpdate, as fixed time step is often lower than framerate eg a 30 or 50 Hz fixed timestep is common, but framerates are usually 60 Hz or more.

    CAUTION: Unsuitable for Input Event handling! Input events may be missed, especially first-frame triggers.

    Unity: FixedUpdate | Godot: _physics_process
  example: []
  syntax:
    content: OnHeartbeat = 5
    return:
      type: Luny.Engine.Bridge.LunyObjectEvent
