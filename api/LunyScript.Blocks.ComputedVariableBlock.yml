  name: ComputedVariableBlock
  nameWithType: ComputedVariableBlock
  fullName: LunyScript.Blocks.ComputedVariableBlock
  type: Class
  source:
    id: ComputedVariableBlock
    path: U:\LunyScratch\LunyScript_Examples_Unity\Packages\de.codesmile.lunyscript\LunyScript\Blocks\Variable\ComputedVariableBlock.cs
    startLine: 9
  assemblies:
  - LunyScript
  namespace: LunyScript.Blocks
  summary: >-
    Abstract base for variable blocks that compute their value on-the-fly from runtime context

    rather than reading from a Table entry. TargetHandle is permanently null, so Set/Add/etc.

    will throw LunyScriptVariableException ("Cannot modify read-only variable").
  example: []
  syntax:
    content: 'public abstract class ComputedVariableBlock : VariableBlock, IScriptBlock'
    content.vb: Public MustInherit Class ComputedVariableBlock Inherits VariableBlock Implements IScriptBlock
