  nameWithType: DebugApi.Break(string)
  fullName: LunyScript.DebugApi.Break(string)
  type: Method
  assemblies:
  - LunyScript
  namespace: LunyScript
  summary: >-
    Triggers a debugger breakpoint if debugger is attached by calling System.Diagnostics.Debugger.Break().

    Completely stripped in release builds.

    Only breaks when DEBUG or LUNYSCRIPT_DEBUG is defined.
  example: []
  syntax:
    content: public ScriptActionBlock Break(string message = null)
    parameters:
    - id: message
      type: System.String
    return:
      type: LunyScript.Blocks.ScriptActionBlock
    content.vb: Public Function Break(message As String = Nothing) As ScriptActionBlock
  overload: LunyScript.DebugApi.Break*
