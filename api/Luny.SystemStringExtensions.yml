  type: Method
  assemblies:
  - Luny
  namespace: Luny
  summary: >-
    Correctness check of a C# identifier (ie variable, method name) that works across platforms and doesn't use Regex.

    It may not catch all edge cases, but 99% of them.
  example: []
  syntax:
    content: public static Boolean IsValidCSharpIdentifier(this String str, Boolean allowNamespaces = false, Boolean allowGenerics = false)
    parameters:
    - id: str
      type: System.String
      description: ''
    - id: allowNamespaces
      type: System.Boolean
      description: Allows '.' as character as well
    - id: allowGenerics
      type: System.Boolean
    return:
      type: System.Boolean
      description: ''
    content.vb: Public Shared Function IsValidCSharpIdentifier(str As [String], allowNamespaces As [Boolean] = False, allowGenerics As [Boolean] = False) As [Boolean]
