  assemblies:
  - Luny
  namespace: Luny
  summary: Converts any backslashes '\' to forward slashes '/' to "normalize" strings representing a path.
  remarks: >-
    Method first checks if there is a '\' in the string to avoid unnecessary string allocations.

    Uses IndexOf() and Replace() which are both SIMD-optimized.
  example: []
  syntax:
    content: public static string ToForwardSlashes(this string str)
