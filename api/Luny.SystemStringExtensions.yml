  namespace: Luny
  summary: >-
    Correctness check of a C# identifier (ie variable, method name) that works across platforms and doesn't use Regex.

    It may not catch all edge cases, but 99% of them.
  example: []
  syntax:
    content: public static bool IsValidCSharpIdentifier(this string str, bool allowNamespaces = false, bool allowGenerics = false)
    parameters:
    - id: str
      type: System.String
      description: ''
    - id: allowNamespaces
      type: System.Boolean
      description: Allows '.' as character as well
    - id: allowGenerics
      type: System.Boolean
    return:
      type: System.Boolean
      description: ''
