  fullName: Luny.SystemStringExtensions.ReplaceIllegalCSharpIdentifierChars(System.String, System.Char)
  type: Method
  assemblies:
  - Luny
  namespace: Luny
  summary: >-
    Replaces any illegal C# identifier character in the string with the given replacement character.

    If the string matches a known C# keyword, it gets prefixed with '@' to make it a legal identifier.
  example: []
  syntax:
    content: public static String ReplaceIllegalCSharpIdentifierChars(this String str, Char replacement = '_')
    parameters:
    - id: str
      type: System.String
      description: ''
    - id: replacement
      type: System.Char
      description: ''
    return:
      type: System.String
      description: ''
    content.vb: Public Shared Function ReplaceIllegalCSharpIdentifierChars(str As [String], replacement As [Char] = "_"c) As [String]
