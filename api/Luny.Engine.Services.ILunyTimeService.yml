  summary: Provides engine-agnostic access to time and frame information.
  remarks: 'IMPORTANT: Implementations must inherit from both the ILuny***Service interface and its corresponding Luny***ServiceBase class!'
  example: []
  syntax:
    content: 'public interface ILunyTimeService : ILunyEngineService'
    content.vb: Public Interface ILunyTimeService Inherits ILunyEngineService
  derivedClasses:
