  name: DeltaTime
  nameWithType: ILunyTimeService.DeltaTime
  fullName: Luny.Engine.Services.ILunyTimeService.DeltaTime
  type: Property
  assemblies:
  - Luny
  namespace: Luny.Engine.Services
  summary: Time since last frame update. Updates once after heartbeat. Value varies with framerate.
  remarks: When read in a Heartbeat method, be aware that DeltaTime is last frame's deltaTime.
  example: []
  syntax:
    content: double DeltaTime { get; }
    parameters: []
    return:
      type: System.Double
    content.vb: ReadOnly Property DeltaTime As Double
  overload: Luny.Engine.Services.ILunyTimeService.DeltaTime*
