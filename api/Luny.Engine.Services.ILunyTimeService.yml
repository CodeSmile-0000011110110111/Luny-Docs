- uid: Luny.Engine.Services.ILunyTimeService.EngineFrameCount
  commentId: P:Luny.Engine.Services.ILunyTimeService.EngineFrameCount
  id: EngineFrameCount
  parent: Luny.Engine.Services.ILunyTimeService
  langs:
  - csharp
  - vb
  name: EngineFrameCount
  nameWithType: ILunyTimeService.EngineFrameCount
  fullName: Luny.Engine.Services.ILunyTimeService.EngineFrameCount
  type: Property
  assemblies:
  - Luny
  namespace: Luny.Engine.Services
  summary: Gets the engine's frame count since the application started.
  remarks: >-
    CAUTION: This value may differ between engines! Some engines start with frame 0, others in frame 1.

    Unity for instance launches in frame 0 where it runs Awake and OnEnable, but by Start it has incremented FrameCount to 1.

    While in Godot the entire first frame's FrameCount is 0.

    Prefer FrameCount since it is the same for all engines.
  example: []
  syntax:
    content: long EngineFrameCount { get; }
    parameters: []
    return:
      type: System.Int64
    content.vb: ReadOnly Property EngineFrameCount As Long
  overload: Luny.Engine.Services.ILunyTimeService.EngineFrameCount*
- uid: Luny.Engine.Services.ILunyTimeService.FrameCount
  commentId: P:Luny.Engine.Services.ILunyTimeService.FrameCount
  id: FrameCount
  parent: Luny.Engine.Services.ILunyTimeService
  langs:
  - csharp
  - vb
  name: FrameCount
  nameWithType: ILunyTimeService.FrameCount
  fullName: Luny.Engine.Services.ILunyTimeService.FrameCount
  type: Property
  assemblies:
  - Luny
  namespace: Luny.Engine.Services
  summary: Gets the total number of frames LunyEngine has run since launch. This value is consistent across engines.
  remarks: Initialization (startup, OnCreate, OnEnable) occurs in FrameCount 0. By OnReady (and before first OnHeartbeat/OnFrame) FrameCount will be 1.
  example: []
  syntax:
    content: long FrameCount { get; }
    parameters: []
    return:
      type: System.Int64
    content.vb: ReadOnly Property FrameCount As Long
  overload: Luny.Engine.Services.ILunyTimeService.FrameCount*
