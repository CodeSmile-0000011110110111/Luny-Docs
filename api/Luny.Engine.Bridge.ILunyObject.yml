- uid: Luny.Engine.Bridge.ILunyObject.IsEnabled
  commentId: P:Luny.Engine.Bridge.ILunyObject.IsEnabled
  id: IsEnabled
  parent: Luny.Engine.Bridge.ILunyObject
  langs:
  - csharp
  - vb
  name: IsEnabled
  nameWithType: ILunyObject.IsEnabled
  fullName: Luny.Engine.Bridge.ILunyObject.IsEnabled
  type: Property
  assemblies:
  - Luny
  namespace: Luny.Engine.Bridge
  summary: >-
    Whether the engine object is processing and visible.

    Matches the "Active" state of Unity. Most events (update, input, collision, ..) will not run when the object is disabled.

    OnDestroy is the exception: It will run for a disabled object when it gets destroyed.
  remarks: >-
    CAUTION: IsEnabled also toggles visibility. If the object's IsVisible is set to false,

    and then is disabled and enabled again, it will also be visible. If you wish the object to remain invisible,

    you will have to set IsVisible=false after re-enabling the object. This is a decent compromise supported by all engines.
  example: []
  syntax:
    content: bool IsEnabled { get; set; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: Property IsEnabled As Boolean
  overload: Luny.Engine.Bridge.ILunyObject.IsEnabled*
- uid: Luny.Engine.Bridge.ILunyObject.IsEnabledInHierarchy
  commentId: P:Luny.Engine.Bridge.ILunyObject.IsEnabledInHierarchy
  id: IsEnabledInHierarchy
  parent: Luny.Engine.Bridge.ILunyObject
  langs:
  - csharp
  - vb
  name: IsEnabledInHierarchy
  nameWithType: ILunyObject.IsEnabledInHierarchy
  fullName: Luny.Engine.Bridge.ILunyObject.IsEnabledInHierarchy
  type: Property
  assemblies:
  - Luny
  namespace: Luny.Engine.Bridge
  summary: Returns true only if BOTH the object itself AND all of its parents are enabled. Otherwise returns false.
  example: []
  syntax:
    content: bool IsEnabledInHierarchy { get; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: ReadOnly Property IsEnabledInHierarchy As Boolean
  overload: Luny.Engine.Bridge.ILunyObject.IsEnabledInHierarchy*
- uid: Luny.Engine.Bridge.ILunyObject.IsVisible
  commentId: P:Luny.Engine.Bridge.ILunyObject.IsVisible
  id: IsVisible
  parent: Luny.Engine.Bridge.ILunyObject
  langs:
  - csharp
  - vb
  name: IsVisible
  nameWithType: ILunyObject.IsVisible
  fullName: Luny.Engine.Bridge.ILunyObject.IsVisible
  type: Property
  assemblies:
  - Luny
  namespace: Luny.Engine.Bridge
  summary: >-
    Whether the object is visible (gets rendered).

    CAUTION: This property does not imply that the object can be "seen"! IsVisible might be true while the object isn't visible

    on the screen, for example because it's outside the camera's viewport, obstructed by other objects closer to the camera,

    scaled infinitely small, completely transparent, or missing a resource (shader, texture, mesh) required to display it.
  example: []
  syntax:
    content: bool IsVisible { get; set; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: Property IsVisible As Boolean
  overload: Luny.Engine.Bridge.ILunyObject.IsVisible*
- uid: Luny.Engine.Bridge.ILunyObject.OnCreate
  commentId: E:Luny.Engine.Bridge.ILunyObject.OnCreate
  id: OnCreate
  parent: Luny.Engine.Bridge.ILunyObject
  langs:
  - csharp
  - vb
  name: OnCreate
  nameWithType: ILunyObject.OnCreate
  fullName: Luny.Engine.Bridge.ILunyObject.OnCreate
  type: Event
  assemblies:
  - Luny
  namespace: Luny.Engine.Bridge
  summary: >-
    Sent once when the object is "created". Guaranteed to be the object's first lifecycle event.

    Runs even if the object starts disabled.
  remarks: >-
    Runs only when an object gets 'registered' with Luny, not when the engine-native object is created. Engine-native

    creation events (Unity: Awake / Godot: _init or ctor) will run before OnCreate.
  example: []
  syntax:
    content: event Action OnCreate
    return:
      type: System.Action
    content.vb: Event OnCreate As Action
- uid: Luny.Engine.Bridge.ILunyObject.OnDestroy
  commentId: E:Luny.Engine.Bridge.ILunyObject.OnDestroy
  id: OnDestroy
  parent: Luny.Engine.Bridge.ILunyObject
  langs:
  - csharp
  - vb
  name: OnDestroy
  nameWithType: ILunyObject.OnDestroy
  fullName: Luny.Engine.Bridge.ILunyObject.OnDestroy
  type: Event
  assemblies:
  - Luny
  namespace: Luny.Engine.Bridge
  summary: >-
    Sent once when the object is "destroyed". Guaranteed to be the object's last lifecycle event.

    Runs even for disabled objects.
  remarks: Runs when the object is marked for deletion in Luny. The engine's native object is set inactive, but not yet destroyed.
  example: []
  syntax:
    content: event Action OnDestroy
    return:
      type: System.Action
    content.vb: Event OnDestroy As Action
- uid: Luny.Engine.Bridge.ILunyObject.OnReady
  commentId: E:Luny.Engine.Bridge.ILunyObject.OnReady
  id: OnReady
  parent: Luny.Engine.Bridge.ILunyObject
  langs:
  - csharp
  - vb
  name: OnReady
  nameWithType: ILunyObject.OnReady
  fullName: Luny.Engine.Bridge.ILunyObject.OnReady
  type: Event
  assemblies:
  - Luny
  namespace: Luny.Engine.Bridge
  summary: >-
    Sent once just before the object runs its first OnUpdate (or OnFixedUpdate, see below).

    If the object starts disabled, OnReady is deferred until the object gets enabled.

    If the object gets or is enabled, OnEnable is guaranteed to run before OnReady. Both run in the same frame.
  remarks: >-
    Depending on whether OnFixedStep happens to run in the frame the object becomes "ready", the event order is either:
    	OnReady =&gt; OnUpdate (first) =&gt; OnLateUpdate (first)
    or:
    	OnReady =&gt; OnFixedStep (first) =&gt; OnUpdate (first) =&gt; OnLateUpdate (first)
  example: []
  syntax:
    content: event Action OnReady
    return:
      type: System.Action
    content.vb: Event OnReady As Action
- uid: Luny.Engine.Bridge.ILunyObject.OnEnable
  commentId: E:Luny.Engine.Bridge.ILunyObject.OnEnable
  id: OnEnable
  parent: Luny.Engine.Bridge.ILunyObject
  langs:
  - csharp
  - vb
  name: OnEnable
  nameWithType: ILunyObject.OnEnable
  fullName: Luny.Engine.Bridge.ILunyObject.OnEnable
  type: Event
  assemblies:
  - Luny
  namespace: Luny.Engine.Bridge
  summary: >-
    Sent every time the object's enabled state changes to "enabled": visible, updating, receiving events, interacting with other objects.

    Also runs right after OnCreate if the object starts enabled.

    The engine-native object is already set enabled when this event runs.
  remarks: OnDestroy event will run even when a disabled object gets destroyed.
  example: []
  syntax:
    content: event Action OnEnable
    return:
      type: System.Action
    content.vb: Event OnEnable As Action
- uid: Luny.Engine.Bridge.ILunyObject.OnDisable
  commentId: E:Luny.Engine.Bridge.ILunyObject.OnDisable
  id: OnDisable
  parent: Luny.Engine.Bridge.ILunyObject
  langs:
  - csharp
  - vb
  name: OnDisable
  nameWithType: ILunyObject.OnDisable
  fullName: Luny.Engine.Bridge.ILunyObject.OnDisable
  type: Event
  assemblies:
  - Luny
  namespace: Luny.Engine.Bridge
  summary: >-
    Sent every time the object's enabled state changes to "disabled": hidden, not updating, not receiving events, not interacting with other objects.

    If the object is enabled and gets destroyed, OnDisable will run before OnDestroy.

    The engine-native object is already set disabled when this event runs.
  example: []
  syntax:
    content: event Action OnDisable
    return:
      type: System.Action
    content.vb: Event OnDisable As Action
