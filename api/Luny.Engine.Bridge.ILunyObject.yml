    content.vb: Event OnDestroyed As Action
- uid: Luny.Engine.Bridge.ILunyObject.OnReady
  commentId: E:Luny.Engine.Bridge.ILunyObject.OnReady
  id: OnReady
  parent: Luny.Engine.Bridge.ILunyObject
  langs:
  - csharp
  - vb
  name: OnReady
  nameWithType: ILunyObject.OnReady
  fullName: Luny.Engine.Bridge.ILunyObject.OnReady
  type: Event
  assemblies:
  - Luny
  namespace: Luny.Engine.Bridge
  summary: >-
    Runs once before the object's first frame processing, before OnFrameUpdate and OnHeartbeat.

    If the object starts disabled, OnReady runs after the object first gets enabled.
  remarks: >-
    It is not guaranteed that the object will simulate physics in its first active frame. The event order is either:
    	OnReady =&gt; OnFrameUpdate (object's first)
    or:
    	OnReady =&gt; OnHeartbeat (object's first) =&gt; OnFrameUpdate (object's first)
  example: []
  syntax:
    content: event Action OnReady
    return:
      type: System.Action
    content.vb: Event OnReady As Action
