- uid: Luny.Engine.Bridge.ILunyObject.IsEnabled
  commentId: P:Luny.Engine.Bridge.ILunyObject.IsEnabled
  id: IsEnabled
  parent: Luny.Engine.Bridge.ILunyObject
  langs:
  - csharp
  - vb
  name: IsEnabled
  nameWithType: ILunyObject.IsEnabled
  fullName: Luny.Engine.Bridge.ILunyObject.IsEnabled
  type: Property
  assemblies:
  - Luny
  namespace: Luny.Engine.Bridge
  summary: Whether the engine object is processing and visible. Matches the "Active" state of Unity.
  remarks: >-
    The object may be enabled, but still be disabled in the hierarchy due to a parent not being enabled.

    IsEnabled also toggles visibility. If the object's IsVisible was set to false, and then the object gets enabled,

    the object's IsVisible state will also change to true.
  example: []
  syntax:
    content: Boolean IsEnabled { get; set; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: Property IsEnabled As [Boolean]
  overload: Luny.Engine.Bridge.ILunyObject.IsEnabled*
