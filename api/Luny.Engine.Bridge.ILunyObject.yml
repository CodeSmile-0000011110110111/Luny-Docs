  fullName: Luny.Engine.Bridge.ILunyObject.IsVisible
  type: Property
  assemblies:
  - Luny
  namespace: Luny.Engine.Bridge
  summary: Whether the object is visible (will render).
  remarks: >-
    This property does NOT imply that the object is currently visible on screen. It is technically visible, but may still

    be outside the camera's frame, obstructed by other objects, fully transparent, scaled infinitely small, etc.
  example: []
  syntax:
    content: Boolean IsVisible { get; set; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: Property IsVisible As [Boolean]
  overload: Luny.Engine.Bridge.ILunyObject.IsVisible*
- uid: Luny.Engine.Bridge.ILunyObject.OnCreated
  commentId: E:Luny.Engine.Bridge.ILunyObject.OnCreated
  id: OnCreated
  parent: Luny.Engine.Bridge.ILunyObject
  langs:
  - csharp
  - vb
  name: OnCreated
  nameWithType: ILunyObject.OnCreated
  fullName: Luny.Engine.Bridge.ILunyObject.OnCreated
  type: Event
  assemblies:
  - Luny
  namespace: Luny.Engine.Bridge
  summary: Runs when the object was created or ownership was transferred to LunyEngine. Runs even if the object starts disabled.
  remarks: >-
    Engine-native creation events (Unity: Awake, OnEnable / Godot: ctor, _init) will run before <xref href="Luny.Engine.Bridge.ILunyObject.OnCreated" data-throw-if-not-resolved="false"></xref>.

    <xref href="Luny.Engine.Bridge.ILunyObject.OnEnabled" data-throw-if-not-resolved="false"></xref> will run right after <xref href="Luny.Engine.Bridge.ILunyObject.OnCreated" data-throw-if-not-resolved="false"></xref> if the object starts enabled.
  example: []
  syntax:
    content: event Action OnCreated
    return:
      type: System.Action
    content.vb: Event OnCreated As Action
