- uid: Luny.Unity.Engine.Services.UnityTimeService.EngineFrameCount
  commentId: P:Luny.Unity.Engine.Services.UnityTimeService.EngineFrameCount
  id: EngineFrameCount
  parent: Luny.Unity.Engine.Services.UnityTimeService
  langs:
  - csharp
  - vb
  name: EngineFrameCount
  nameWithType: UnityTimeService.EngineFrameCount
  fullName: Luny.Unity.Engine.Services.UnityTimeService.EngineFrameCount
  type: Property
  source:
    id: EngineFrameCount
    path: U:\LunyScratch\LunyScript_Examples_Unity\Packages\de.codesmile.lunyscript\Luny.Unity\Engine\Services\UnityTimeService.cs
    startLine: 12
  assemblies:
  - Luny.Unity
  namespace: Luny.Unity.Engine.Services
  summary: Gets the engine's frame count since the application started.
  remarks: >-
    CAUTION: This value may differ between engines! Some engines start with frame 0, others in frame 1.

    Unity for instance launches in frame 0 where it runs Awake and OnEnable, but by Start it has incremented FrameCount to 1.

    While in Godot the entire first frame's FrameCount is 0.

    Prefer FrameCount since it is the same for all engines.
  example: []
  syntax:
    content: public override long EngineFrameCount { get; }
    parameters: []
    return:
      type: System.Int64
    content.vb: Public Overrides ReadOnly Property EngineFrameCount As Long
  overridden: Luny.Engine.Services.LunyTimeServiceBase.EngineFrameCount
  overload: Luny.Unity.Engine.Services.UnityTimeService.EngineFrameCount*
  implements:
  - Luny.Engine.Services.ILunyTimeService.EngineFrameCount
